<!doctype html>
<meta charset="utf-8">
<title>A7 route redirect</title>
<script>
  const base = '/a7-py'
  const path = location.pathname.startsWith(base)
    ? location.pathname.slice(base.length)
    : location.pathname
  location.replace(base + '/?from=' + encodeURIComponent(path + location.search + location.hash))
</script>
<a href="/a7-py/">A7 documentation</a>
